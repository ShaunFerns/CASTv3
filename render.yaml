# CAST v3 Render Blueprint
#
# Deploy this as a Render Blueprint or attach the web service to this file.
# CAST v3 uses the existing Supabase PostgreSQL database. Do not provision a
# Render managed PostgreSQL database for this deployment.
#
# Required secrets are marked sync:false and must be set in the Render
# dashboard or an attached environment group.

services:
  - type: web
    name: cast-v3
    runtime: node
    region: oregon
    plan: starter

    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.26.1 --activate &&
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ PORT=3000 NODE_ENV=production pnpm --filter @workspace/sar-review run build &&
      NODE_ENV=production pnpm --filter @workspace/api-server run build

    preDeployCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.26.1 --activate &&
      node scripts/apply-migrations.mjs &&
      node scripts/seed-greencomp.mjs &&
      node scripts/seed-lifecomp.mjs &&
      node scripts/seed-entrecomp.mjs &&
      node scripts/seed-digcomp.mjs &&
      node scripts/seed-curriculum-design-layers.mjs

    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs

    healthCheckPath: /api/healthz

    envVars:
      - key: NODE_ENV
        value: production

      - key: NODE_VERSION
        value: 24.14.1

      - key: BASE_PATH
        value: /

      - key: LOG_LEVEL
        value: info

      - key: CAST_V3_PREVIEW_BRIDGE
        value: "false"

      # Existing Supabase PostgreSQL connection string. Use the pooler URL if
      # Render cannot reach the direct database host from your network region.
      - key: DATABASE_URL
        sync: false

      - key: SESSION_SECRET
        sync: false

      - key: ADMIN_USERNAME
        sync: false

      - key: ADMIN_PASSWORD
        sync: false

      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false

      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        value: https://api.openai.com/v1
