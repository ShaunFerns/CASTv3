# Render Blueprint — https://render.com/docs/blueprint-spec
#
# IMPORTANT: Deploy this as a Blueprint, not a plain Web Service.
#   1. Push this repo to GitHub (or GitLab).
#   2. In the Render dashboard → New → Blueprint.
#   3. Connect the repo — Render reads this file and provisions BOTH the
#      PostgreSQL database AND the web service automatically.
#   4. After the first deploy, set the four secrets flagged sync:false in
#      the Render dashboard under Environment → Environment Variables:
#
#        AI_INTEGRATIONS_OPENAI_API_KEY   — your OpenAI API key
#        SESSION_SECRET                   — long random string (≥ 32 chars)
#        ADMIN_USERNAME                   — admin login username
#        ADMIN_PASSWORD                   — admin login password
#
# Do NOT create the web service manually — DATABASE_URL is wired from the
# managed database and is only injected automatically when using Blueprint.

databases:
  - name: cast-db
    databaseName: cast
    user: cast
    region: oregon
    # starter = $7/mo (includes 90-day free trial on new accounts).
    # Change to match your Render plan.
    plan: starter

services:
  - type: web
    name: cast-app
    runtime: node
    region: oregon
    plan: starter

    # Build: install deps, then compile the frontend and backend bundles.
    # DATABASE_URL is NOT used here — migrations run in preDeployCommand below.
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ PORT=3000 NODE_ENV=production pnpm --filter @workspace/sar-review run build &&
      NODE_ENV=production pnpm --filter @workspace/api-server run build

    # Runs after the database is ready, before each new deploy goes live.
    # DATABASE_URL is guaranteed to be available here.
    preDeployCommand: pnpm --filter @workspace/db run push-force

    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs

    healthCheckPath: /api/healthz

    envVars:
      - key: NODE_ENV
        value: production

      - key: BASE_PATH
        value: /

      # Wired automatically from the managed PostgreSQL instance above.
      - key: DATABASE_URL
        fromDatabase:
          name: cast-db
          property: connectionString

      # OpenAI key — set manually in the Render dashboard after first deploy.
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false

      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        value: https://api.openai.com/v1

      # Session secret for cookie signing — set manually in the dashboard.
      - key: SESSION_SECRET
        sync: false

      # Admin credentials for /admin/login — set manually in the dashboard.
      - key: ADMIN_USERNAME
        sync: false

      - key: ADMIN_PASSWORD
        sync: false

      - key: LOG_LEVEL
        value: info
