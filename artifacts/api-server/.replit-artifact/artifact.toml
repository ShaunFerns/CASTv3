kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
build = ["sh", "-c", "BASE_PATH=/ pnpm --filter @workspace/sar-review run build && pnpm --filter @workspace/api-server run build"]
run = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.health.startup]
path = "/api/healthz"
